<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- App icon background -->
  <rect width="256" height="256" rx="52" fill="#12121f"/>

  <!-- Calendar body -->
  <rect x="34" y="76" width="188" height="148" rx="18" fill="#1e1e35"/>

  <!-- Calendar header bar -->
  <rect x="34" y="76" width="188" height="58" rx="18" fill="#7b6fff"/>
  <rect x="34" y="114" width="188" height="20" fill="#7b6fff"/>

  <!-- Binding knobs -->
  <rect x="78" y="52" width="22" height="38" rx="8" fill="#c8f064"/>
  <rect x="156" y="52" width="22" height="38" rx="8" fill="#c8f064"/>

  <!-- Week grid — row 1 -->
  <rect x="50"  y="154" width="26" height="22" rx="7" fill="#c8f064"/>
  <rect x="83"  y="154" width="26" height="22" rx="7" fill="#ffffff" opacity="0.15"/>
  <rect x="116" y="154" width="26" height="22" rx="7" fill="#ffffff" opacity="0.15"/>
  <rect x="149" y="154" width="26" height="22" rx="7" fill="#7b6fff" opacity="0.85"/>
  <rect x="182" y="154" width="26" height="22" rx="7" fill="#ffffff" opacity="0.15"/>

  <!-- Week grid — row 2 -->
  <rect x="50"  y="184" width="26" height="22" rx="7" fill="#ffffff" opacity="0.15"/>
  <rect x="83"  y="184" width="26" height="22" rx="7" fill="#c8f064" opacity="0.55"/>
  <rect x="116" y="184" width="26" height="22" rx="7" fill="#ffffff" opacity="0.15"/>
  <rect x="149" y="184" width="26" height="22" rx="7" fill="#ffffff" opacity="0.15"/>
  <rect x="182" y="184" width="26" height="22" rx="7" fill="#7b6fff" opacity="0.55"/>
